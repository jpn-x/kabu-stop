name: Daily Gap Analysis

on:
  schedule:
    - cron: '10 12 * * 1-5'   # 21:10 JST 平日（株データ更新の10分後）
  workflow_dispatch:
    inputs:
      backfill:
        description: '過去データを全件処理する場合は true'
        required: false
        default: 'false'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analyzer
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python analyzer.py --backfill
          else
            python analyzer.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gap_data.csv
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "gap data: $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep 5
          done