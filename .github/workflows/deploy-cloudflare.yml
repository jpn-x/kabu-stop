name: Deploy to Cloudflare

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'index.html'

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 035926d851c17dfd9cf096e0884cd474
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set; skipping Cloudflare deploy."
            exit 0
          fi
          mkdir -p /tmp/site
          rsync -a ./ /tmp/site/ --exclude .git --exclude .github --exclude scripts --exclude '*.py' --exclude requirements.txt --exclude README.md
          npx wrangler@4 pages deploy /tmp/site --project-name=kabu-stop --branch=main --commit-dirty=true