name: Daily Stock Data Update

on:
  schedule:
    - cron: '30 8 * * 1-5'   # 17:30 JST 平日（GitHub Actions 主系に変更）
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 (YYYY-MM-DD) — 空欄で当日'
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Tokyo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        id: scraper
        continue-on-error: true
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: python scraper.py

      - name: Check scraper result
        if: steps.scraper.outcome == 'failure'
        run: |
          echo "::warning::スクレイピング失敗（カブタンIPブロックの可能性）。データ更新をスキップします。"
          exit 0

      - name: Commit and push
        if: steps.scraper.outcome == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stock_data.json
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "auto: update $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push
          )