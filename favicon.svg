<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景 -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>

  <!-- ローソク足 左（陰線・赤） -->
  <line x1="7" y1="5" x2="7" y2="9" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="4.5" y="9" width="5" height="8" rx="1" fill="#ef4444"/>
  <line x1="7" y1="17" x2="7" y2="21" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ローソク足 中（陽線・緑） -->
  <line x1="16" y1="7" x2="16" y2="11" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="13.5" y="11" width="5" height="10" rx="1" fill="#22c55e"/>
  <line x1="16" y1="21" x2="16" y2="25" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ローソク足 右（S高・赤太） -->
  <line x1="25" y1="3" x2="25" y2="7" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="22.5" y="7" width="5" height="12" rx="1" fill="#ef4444"/>
  <line x1="25" y1="19" x2="25" y2="23" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 右上に小さな上矢印（S高イメージ） -->
  <polyline points="25,3 27,6 23,6" fill="#ef4444" stroke="none"/>
</svg>
